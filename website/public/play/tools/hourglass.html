<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Hourglass Timer — PartyBot</title>
<link rel="icon" href="/favicon.png">
<style>
@font-face{font-family:'Instrument Serif';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/InstrumentSerif-Regular.ttf) format('truetype')}
@font-face{font-family:'Instrument Serif';font-style:italic;font-weight:400;font-display:swap;src:url(/fonts/InstrumentSerif-Italic.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/Inter-400.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url(/fonts/Inter-500.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(/fonts/Inter-600.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Inter-700.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:800;font-display:swap;src:url(/fonts/Inter-800.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:900;font-display:swap;src:url(/fonts/Inter-900.ttf) format('truetype')}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f5f5f7;min-height:100dvh;display:flex;flex-direction:column;user-select:none}a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;padding:10px 16px;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}.nav-logo{height:20px}.nav-back{font-size:13px;color:rgba(255,255,255,.5);padding:6px 14px;border-radius:99px;background:rgba(255,255,255,.06)}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;max-width:500px;margin:0 auto;width:100%}
.title{font-size:22px;font-weight:800}
/* Timer display */
.timer-ring{width:220px;height:220px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column}
.timer-ring svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke-width:6;stroke-linecap:round}
.ring-bg{stroke:rgba(255,255,255,.06)}
.ring-fill{stroke:#5AC8FA;transition:stroke-dashoffset .1s linear}
.timer-val{font-size:48px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums}
.timer-label{font-size:13px;color:rgba(255,255,255,.4)}
/* Presets */
.presets{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.preset{padding:10px 16px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:14px;font-weight:700;color:rgba(255,255,255,.6);transition:all .2s}
.preset.active{border-color:rgba(90,200,250,.5);background:rgba(90,200,250,.15);color:#fff}
/* Buttons */
.timer-btns{display:flex;gap:10px;width:100%}
.t-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:transform .15s}
.t-btn:active{transform:scale(.95)}
.btn-start{background:#34C759}.btn-pause{background:#FF9500}.btn-reset{background:rgba(255,255,255,.08)}
.app-cta{text-align:center;padding:12px 16px}.app-cta a{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff1a6e,#ff6b35);border-radius:99px}
</style>
</head>
<body>
<nav class="nav"><a href="/"><img src="/partybot-logo.png" alt="PartyBot" class="nav-logo"></a><a href="/play/" class="nav-back">← All Games</a></nav>
<div class="wrap">
  <div class="title">⏳ Hourglass Timer</div>
  <div class="timer-ring">
    <svg viewBox="0 0 220 220"><circle class="ring-bg" cx="110" cy="110" r="100"/><circle class="ring-fill" id="ringFill" cx="110" cy="110" r="100" stroke-dasharray="628.3" stroke-dashoffset="0"/></svg>
    <div class="timer-val" id="timerVal">0:30</div>
    <div class="timer-label" id="timerLabel">Ready</div>
  </div>
  <div class="presets" id="presets"></div>
  <div class="timer-btns">
    <button class="t-btn btn-reset" onclick="resetTimer()">Reset</button>
    <button class="t-btn btn-start" id="mainBtn" onclick="toggleTimer()">Start</button>
  </div>
</div>
<div class="app-cta"><a href="/#download">📲 Full App</a></div>
<script>
const PRESETS=[15,30,60,90,120,180,300];
let duration=30,remaining=30,running=false,tick=null;
const circ=628.3;

const pp=document.getElementById('presets');
PRESETS.forEach(s=>{
  const d=document.createElement('div');
  d.className='preset'+(s===duration?' active':'');
  d.textContent=s<60?s+'s':Math.floor(s/60)+'m'+(s%60?s%60+'s':'');
  d.onclick=()=>{if(running)return;duration=remaining=s;pp.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));d.classList.add('active');updateDisplay()};
  pp.appendChild(d);
});

function updateDisplay(){
  const m=Math.floor(remaining/60),s=Math.ceil(remaining)%60;
  document.getElementById('timerVal').textContent=`${m}:${String(s).padStart(2,'0')}`;
  const prog=duration>0?remaining/duration:1;
  document.getElementById('ringFill').style.strokeDashoffset=circ*(1-prog);
  document.getElementById('ringFill').style.stroke=prog>.3?'#5AC8FA':prog>.1?'#FF9500':'#FF3B30';
}

function toggleTimer(){
  if(running){running=false;clearInterval(tick);document.getElementById('mainBtn').textContent='Resume';document.getElementById('mainBtn').className='t-btn btn-start';document.getElementById('timerLabel').textContent='Paused'}
  else{running=true;document.getElementById('mainBtn').textContent='Pause';document.getElementById('mainBtn').className='t-btn btn-pause';document.getElementById('timerLabel').textContent='Running';tick=setInterval(()=>{remaining=Math.max(0,remaining-.1);updateDisplay();if(remaining<=0){clearInterval(tick);running=false;document.getElementById('timerLabel').textContent='Done!';document.getElementById('mainBtn').textContent='Start';document.getElementById('mainBtn').className='t-btn btn-start'}},100)}
}

function resetTimer(){running=false;clearInterval(tick);remaining=duration;document.getElementById('mainBtn').textContent='Start';document.getElementById('mainBtn').className='t-btn btn-start';document.getElementById('timerLabel').textContent='Ready';updateDisplay()}
updateDisplay();
</script>
</body>
</html>
