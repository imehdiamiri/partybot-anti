<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Spin the Bottle — PartyBot</title>
<meta name="description" content="Classic spin the bottle game — add player names and spin! Free online party tool.">
<link rel="icon" href="/favicon.png">
<style>
@font-face{font-family:'Instrument Serif';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/InstrumentSerif-Regular.ttf) format('truetype')}
@font-face{font-family:'Instrument Serif';font-style:italic;font-weight:400;font-display:swap;src:url(/fonts/InstrumentSerif-Italic.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(/fonts/Inter-400.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:500;font-display:swap;src:url(/fonts/Inter-500.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(/fonts/Inter-600.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(/fonts/Inter-700.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:800;font-display:swap;src:url(/fonts/Inter-800.ttf) format('truetype')}
@font-face{font-family:'Inter';font-style:normal;font-weight:900;font-display:swap;src:url(/fonts/Inter-900.ttf) format('truetype')}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f5f5f7;min-height:100dvh;display:flex;flex-direction:column;user-select:none;overflow:hidden}
a{color:inherit;text-decoration:none}
.nav{position:sticky;top:0;z-index:100;padding:10px 16px;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.nav-logo{height:20px}.nav-back{font-size:13px;color:rgba(255,255,255,.5);padding:6px 14px;border-radius:99px;background:rgba(255,255,255,.06)}
.wrap{flex:1;display:flex;flex-direction:column;max-width:500px;width:100%;margin:0 auto;padding:0 16px;overflow:hidden}

/* Input row */
.input-row{display:flex;gap:8px;padding-top:16px}
.name-input{flex:1;background:rgba(255,255,255,.06);border-radius:14px;border:1px solid rgba(255,255,255,.08);color:#fff;padding:14px 16px;font-size:16px;font-family:inherit;outline:none}
.name-input::placeholder{color:rgba(255,255,255,.3)}
.name-input:focus{border-color:rgba(255,45,85,.4)}
.add-btn{width:48px;height:48px;background:#FF2D55;border-radius:14px;border:none;cursor:pointer;font-size:24px;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.add-btn:active{transform:scale(.9)}
.add-btn:disabled{opacity:.4;cursor:default}

/* Chips */
.chips{display:flex;gap:6px;padding-top:12px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.chips::-webkit-scrollbar{display:none}
.chip{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid transparent;font-size:13px;font-weight:700;color:rgba(255,255,255,.85);white-space:nowrap;flex-shrink:0}
.chip.selected{background:#34C759;border-color:#34C759;color:#fff}
.chip-x{cursor:pointer;font-size:10px;color:rgba(255,255,255,.5);font-weight:900;padding:2px}
.chip.selected .chip-x{color:#fff}

/* Spin area */
.spin-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.wheel{position:relative;width:min(85vw,360px);height:min(85vw,360px)}

/* Name ring */
.name-label{position:absolute;top:50%;left:50%;font-size:14px;font-weight:600;color:rgba(255,255,255,.85);text-align:center;transform-origin:center;white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none;width:100px;margin-left:-50px;margin-top:-10px}
.name-label.selected{background:#34C759;color:#fff;padding:6px 14px;border-radius:20px;font-weight:800;box-shadow:0 4px 16px rgba(52,199,89,.4)}

/* Bottle */
.bottle-wrap{position:absolute;top:50%;left:50%;transform-origin:center center;transition:transform 8s cubic-bezier(.15,.45,.2,1)}
.bottle-img{display:block;filter:drop-shadow(0 8px 16px rgba(0,0,0,.6))}

/* Empty hint */
.empty-hint{text-align:center;color:rgba(255,255,255,.45);font-size:15px;font-weight:600;margin-bottom:8px}

/* Spin button */
.spin-container{padding:0 20px 28px}
.spin-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border:none;border-radius:999px;font-size:17px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(90deg,#FF2D55,#AF52DE);box-shadow:0 6px 24px rgba(255,45,85,.35);transition:transform .15s,opacity .15s}
.spin-btn:active{transform:scale(.96)}
.spin-btn:disabled{opacity:.6;cursor:default}
.spin-btn svg{width:18px;height:18px}

.app-cta{text-align:center;padding:12px 16px}
.app-cta a{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;font-size:12px;font-weight:700;color:#fff;background:linear-gradient(135deg,#ff1a6e,#ff6b35);border-radius:99px}
</style>
</head>
<body>
<nav class="nav"><a href="/"><img src="/partybot-logo.png" alt="PartyBot" class="nav-logo"></a><a href="/play/" class="nav-back">← All Games</a></nav>

<div class="wrap">
  <!-- Input -->
  <div class="input-row">
    <input type="text" class="name-input" id="nameInput" placeholder="Add a name" autocomplete="off" autocapitalize="words">
    <button class="add-btn" id="addBtn" disabled onclick="addName()">+</button>
  </div>

  <!-- Chips -->
  <div class="chips" id="chips"></div>

  <!-- Spin area -->
  <div class="spin-area">
    <div class="wheel" id="wheel">
      <!-- Name labels will be added here dynamically -->
      <div class="bottle-wrap" id="bottleWrap">
        <img src="assets/bottle.png"
             class="bottle-img" id="bottleImg" alt="Bottle"
             style="width:60px;height:144px;object-fit:contain">
      </div>
    </div>
  </div>

  <!-- Empty hint -->
  <div class="empty-hint" id="emptyHint">Add names to spin the bottle</div>
</div>

<!-- Spin button -->
<div class="spin-container">
  <button class="spin-btn" id="spinBtn" onclick="spin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M2.5 12a10 10 0 0 1 16.5-6.5L21.5 8M21.5 12a10 10 0 0 1-16.5 6.5L2.5 16"/></svg>
    Spin
  </button>
</div>

<div class="app-cta"><a href="/#download">📲 Full App</a></div>

<script>
let names=[], spinning=false, selectedIndex=null, totalAngle=0;

const nameInput=document.getElementById('nameInput');
const addBtnEl=document.getElementById('addBtn');
const chipsEl=document.getElementById('chips');
const wheelEl=document.getElementById('wheel');
const bottleWrap=document.getElementById('bottleWrap');
const emptyHint=document.getElementById('emptyHint');
const spinBtn=document.getElementById('spinBtn');

nameInput.addEventListener('input',()=>{addBtnEl.disabled=!nameInput.value.trim()});
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')addName()});

function addName(){
  const v=nameInput.value.trim();
  if(!v)return;
  names.push(v);
  nameInput.value='';
  addBtnEl.disabled=true;
  selectedIndex=null;
  renderAll();
  nameInput.focus();
}

function removeName(i){
  names.splice(i,1);
  if(selectedIndex===i)selectedIndex=null;
  else if(selectedIndex!==null&&selectedIndex>i)selectedIndex--;
  renderAll();
}

function renderAll(){
  // Chips
  chipsEl.innerHTML='';
  names.forEach((n,i)=>{
    const c=document.createElement('div');
    c.className='chip'+(selectedIndex===i?' selected':'');
    c.innerHTML=`<span>${n}</span><span class="chip-x" onclick="removeName(${i})">✕</span>`;
    chipsEl.appendChild(c);
  });
  // Empty hint
  emptyHint.style.display=names.length===0?'block':'none';
  // Name ring
  renderNameRing();
}

function renderNameRing(){
  // Remove old labels
  wheelEl.querySelectorAll('.name-label').forEach(el=>el.remove());
  if(names.length===0)return;

  const rect=wheelEl.getBoundingClientRect();
  const cx=rect.width/2, cy=rect.height/2;
  const radius=Math.min(cx,cy)-44;

  names.forEach((name,i)=>{
    const angle=(360/names.length)*i-90;
    const rad=angle*Math.PI/180;
    const x=Math.cos(rad)*radius;
    const y=Math.sin(rad)*radius;
    const label=document.createElement('div');
    label.className='name-label'+(selectedIndex===i?' selected':'');
    label.textContent=name;
    label.style.transform=`translate(${x}px, ${y}px)`;
    wheelEl.appendChild(label);
  });
}

function spin(){
  if(spinning)return;
  spinning=true;
  selectedIndex=null;
  spinBtn.disabled=true;
  renderAll();

  const hasNames=names.length>0;
  const target=hasNames?Math.floor(Math.random()*names.length):0;
  const perSlice=hasNames?360/names.length:0;
  const baseRotations=(Math.floor(Math.random()*5)+10)*360;
  const targetAngle=perSlice*target;
  const jitter=hasNames?Math.random()*perSlice*0.5-perSlice*0.25:Math.random()*360;

  const normalized=totalAngle%360;
  totalAngle=totalAngle-normalized+baseRotations+targetAngle+jitter;

  bottleWrap.style.transition='transform 8s cubic-bezier(.15,.45,.2,1)';
  bottleWrap.style.transform=`translate(-50%,-50%) rotate(${totalAngle}deg)`;

  setTimeout(()=>{
    if(hasNames)selectedIndex=target;
    spinning=false;
    spinBtn.disabled=false;
    renderAll();
  },8100);
}

// Center bottle initially
bottleWrap.style.transform='translate(-50%,-50%) rotate(0deg)';
renderAll();
</script>
</body>
</html>
